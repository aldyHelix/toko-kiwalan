name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php:
    name: PHP — Pint, PHPStan, Pest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: toko_kiwalan_testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: toko_kiwalan_testing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, intl, gd, zip
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Pint (format check)
        run: ./vendor/bin/pint --test

      - name: PHPStan (static analysis, level 6)
        run: composer stan

      - name: Pest (tests + coverage)
        # The ≥80% threshold (--min=80) is enabled from Fase 1 onward, once the
        # first business logic lands; Fase 0 scaffold reports coverage only.
        run: php artisan test --coverage

  frontend:
    name: Frontend — type-check, lint, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (vue-tsc)
        run: npm run type-check

      - name: Lint (ESLint)
        run: npm run lint:check

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Build (Vite)
        run: npm run build
